<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0.05" y1="0" x2="0.95" y2="1">
      <stop offset="0" stop-color="#ff6b75"/>
      <stop offset="0.48" stop-color="#ff3d54"/>
      <stop offset="1" stop-color="#7a1322"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.28" cy="0.16" r="0.82" fx="0.28" fy="0.16">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe4e8"/>
    </linearGradient>
    <linearGradient id="bladeShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7a1322" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.62" cy="0.34" r="0.72">
      <stop offset="0" stop-color="#fff1f3"/>
      <stop offset="0.42" stop-color="#2b0710"/>
      <stop offset="1" stop-color="#120308"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#sheen)"/>

  <g transform="translate(512 524)">
    <g opacity="0.18" stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none">
      <path d="M -292 0 H 292 M 0 -292 V 292"/>
      <rect x="-264" y="-264" width="528" height="528" rx="54" ry="54" stroke-dasharray="54 38"/>
    </g>

    <circle r="286" fill="#7a1322" fill-opacity="0.26"/>

    <!-- One iris blade repeated every 60 degrees; the skewed quadrilateral creates the aperture twist. -->
    <g filter="none">
      <path id="b" d="M -33 -260 C 50 -274 147 -234 207 -158 L 75 -18 L -63 -73 Z" fill="url(#blade)"/>
      <use href="#b" transform="rotate(60)"/>
      <use href="#b" transform="rotate(120)"/>
      <use href="#b" transform="rotate(180)"/>
      <use href="#b" transform="rotate(240)"/>
      <use href="#b" transform="rotate(300)"/>
    </g>

    <g opacity="0.7">
      <path d="M -33 -260 C 50 -274 147 -234 207 -158 L 75 -18 L -63 -73 Z" fill="url(#bladeShade)"/>
      <path d="M -33 -260 C 50 -274 147 -234 207 -158 L 75 -18 L -63 -73 Z" fill="none" stroke="#7a1322" stroke-width="5" stroke-opacity="0.24"/>
      <use href="#b" transform="rotate(60)" opacity="0.92"/>
      <use href="#b" transform="rotate(120)" opacity="0.84"/>
      <use href="#b" transform="rotate(180)" opacity="0.95"/>
      <use href="#b" transform="rotate(240)" opacity="0.86"/>
      <use href="#b" transform="rotate(300)" opacity="0.9"/>
    </g>

    <circle r="118" fill="url(#lens)" stroke="#ffffff" stroke-width="12" stroke-opacity="0.84"/>
    <circle cx="40" cy="-42" r="32" fill="#ffffff" fill-opacity="0.86"/>
    <circle cx="70" cy="-70" r="12" fill="#ffffff" fill-opacity="0.58"/>
  </g>
</svg>
