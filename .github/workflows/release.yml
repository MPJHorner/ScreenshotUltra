name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build & upload (unsigned)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Toolchain
        run: |
          rustup show
          rustc --version

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build universal release binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/screenshot-ultra \
            target/x86_64-apple-darwin/release/screenshot-ultra \
            -output target/release/screenshot-ultra
          file target/release/screenshot-ultra

      - name: Build .app bundle
        run: make app

      - name: Package .zip
        id: package
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${REF_NAME:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then echo "no tag provided"; exit 1; fi
          ZIP="ScreenshotUltra-${TAG}-universal.zip"
          (cd dist && /usr/bin/ditto -c -k --sequesterRsrc --keepParent "Screenshot Ultra.app" "../$ZIP")
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$ZIP" | tee "${ZIP}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.sha256
          body: |
            # Screenshot Ultra ${{ steps.package.outputs.tag }}

            Unsigned universal `.app` bundled in a zip. On first run macOS will quarantine
            it; clear with:

            ```sh
            xattr -dr com.apple.quarantine "/Applications/Screenshot Ultra.app"
            ```

            Signing + notarisation lands in M6.
          generate_release_notes: true
