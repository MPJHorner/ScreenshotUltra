site_name: Screenshot Ultra
site_description: A snappy, hotkey-first macOS screenshot and screen recorder. Local-first. No cloud.
site_url: https://mpjhorner.github.io/ScreenshotUltra/
repo_url: https://github.com/MPJHorner/ScreenshotUltra
repo_name: MPJHorner/ScreenshotUltra
edit_uri: edit/main/site/docs/

docs_dir: docs
site_dir: ../target/site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Install: install.md
  - Quick start: quick-start.md
  - Hotkeys: hotkeys.md
  - Capture modes: capture.md
  - Sinks & shell: sinks.md
  - Configuration: configuration.md
  - Logging: logging.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MPJHorner/ScreenshotUltra
