<header class="topbar" role="banner">
  <div class="topbar-inner">
    <a class="brand" href="{{base}}/" aria-label="Screenshot Ultra home">
      <svg class="brand-logo" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
        <defs>
          <linearGradient id="navg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF6B75"/>
            <stop offset="1" stop-color="#7a1322"/>
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="7" fill="url(#navg)" opacity=".22"/>
        <!-- aperture: outer ring + 6 spokes + inner lens -->
        <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round">
          <circle cx="16" cy="16" r="9"/>
          <line x1="16" y1="7"  x2="16" y2="11"/>
          <line x1="23.8" y1="11.5" x2="20.3" y2="13.5"/>
          <line x1="23.8" y1="20.5" x2="20.3" y2="18.5"/>
          <line x1="16" y1="25" x2="16" y2="21"/>
          <line x1="8.2"  y1="20.5" x2="11.7" y2="18.5"/>
          <line x1="8.2"  y1="11.5" x2="11.7" y2="13.5"/>
        </g>
        <circle cx="16" cy="16" r="3" fill="currentColor"/>
      </svg>
      <span class="brand-name">Screenshot <span class="brand-mark">Ultra</span></span>
    </a>

    <nav class="primary-nav" aria-label="Primary">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-list" aria-label="Toggle navigation">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-list" id="nav-list">
          {{nav_links}}
        <div class="nav-actions">
          <button class="icon-btn theme-toggle" id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M8 1.5a6.5 6.5 0 1 0 6.4 5.4 5.5 5.5 0 0 1-6.9-6.9A6.6 6.6 0 0 0 8 1.5Z"/></svg>
          </button>
          <a class="icon-btn github-link" href="{{repo}}" rel="noopener noreferrer" aria-label="GitHub repository" title="GitHub">
            <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.23.48-2.7-1.07-2.7-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.81.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.51-1.08-1.78-.2-3.65-.89-3.65-3.95 0-.87.31-1.59.83-2.15-.08-.21-.36-1.02.08-2.13 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.92.08 2.13.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.66 3.95.29.25.54.73.54 1.48v2.2c0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
          </a>
        </div>
      </div>
    </nav>
  </div>
</header>
