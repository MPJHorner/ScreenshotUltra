<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0a0d11" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="dark light" />
  {{head}}
  <link rel="icon" href="{{base}}/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="{{base}}/apple-touch-icon.svg" />
  <link rel="stylesheet" href="{{base}}/style.css" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('stu-theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>
<body class="home">
  {{nav}}
  <main class="page home-page">
    <article class="prose">
      {{content}}
    </article>
  </main>
  {{footer}}
  <script src="{{base}}/theme.js" defer></script>
  <script src="{{base}}/copy.js" defer></script>
</body>
</html>
